<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>강좌 통계 - 강좌관리 - 늘봄학교</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.2.0/css/font-awesome.min.css"
    />
    <link rel="stylesheet" href="./assets/css/app.css" />
  </head>
  <body>
    <div id="header" class="topbar">
      <div class="topbar-inner">
        <div class="topbar-center">
          <span class="topbar-title">늘봄학교</span><span class="caret"></span>
        </div>
      </div>
    </div>
    <div id="container" class="layout">
      <aside id="left_menu" class="sidebar">
        <div class="sidebar-school">운천초등학교</div>
        <div class="sidebar-actions">
          <a href="index.html" class="btn btn-success btn-sm">홈으로</a
          ><a href="./lec_write.html" class="btn btn-danger btn-sm">강좌등록</a>
        </div>
        <ul class="nav side-nav">
          <li>
            <a href="./manual.html"><i class="fa fa-download"></i> 매뉴얼</a>
          </li>
          <li class="active">
            <a href="index.html"
              ><i class="fa fa-globe icon-blue"></i> 강좌관리</a
            >
          </li>
        </ul>
      </aside>

      <main id="contents_box" class="content">
        <div id="contents_title" class="page-title">
          <div class="title-left">
            <div class="title-main">
              <i class="fa fa-bar-chart"></i> 강좌 통계
            </div>
            <div class="title-sub">운천초등학교 늘봄학교</div>
          </div>
        </div>
        <div id="contents" class="content-inner">
          <form
            id="fm-stats-filter"
            class="filter-bar"
            style="margin-bottom: 14px"
          >
            <div class="filter-row">
              <select class="form-control input-sm filter-select">
                <option value="">=구분 전체=</option>
                <option>3월</option>
                <option>4월</option>
                <option>5월</option>
                <option>6월</option>
                <option>7월</option>
                <option>8월</option>
                <option>9월</option>
                <option>10월</option>
                <option>11월</option>
                <option>12월</option>
                <option>1월</option>
                <option>2월</option>
              </select>
              <select class="form-control input-sm filter-select">
                <option value="">=늘봄과정 전체=</option>
                <option>방과후</option>
                <option>맞춤형</option>
                <option>돌봄</option>
              </select>
              <button type="submit" class="btn btn-default btn-sm">조회</button>
            </div>
          </form>

          <div class="table-wrap">
            <table class="table table-bordered table-condensed align-center">
              <thead>
                <tr>
                  <th>구분</th>
                  <th>늘봄과정</th>
                  <th>강좌수</th>
                  <th>정원 합계</th>
                  <th>신청자 합계</th>
                  <th>수강료 합계</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>2월</td>
                  <td>돌봄</td>
                  <td>2</td>
                  <td>60</td>
                  <td>14</td>
                  <td>0</td>
                </tr>
                <tr>
                  <td colspan="2" class="text-right"><strong>합계</strong></td>
                  <td>2</td>
                  <td>60</td>
                  <td>14</td>
                  <td>0</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div style="margin-top: 14px">
            <button
              type="button"
              id="btn-stats-download"
              class="btn btn-default btn-sm"
            >
              <i class="fa fa-download"></i> 통계 자료 다운로드
            </button>
            <a href="index.html" class="btn btn-default btn-sm">목록</a>
          </div>
        </div>
        <div id="footer" class="footer">
          <span class="muted">DBDB School Clone</span>
        </div>
      </main>
    </div>
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="./assets/js/app.js"></script>
  </body>
</html>
