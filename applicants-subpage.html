<!doctype html>

    />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"

  </head>
  <body data-sidebar-page="applicants">
    <div id="header" class="topbar">
      <div class="topbar-inner">

      </div>

                          <option>3</option>

                          <option>=반=</option>

                          <option>2</option>
                          <option>3</option>
                        </select>

                          style="width: 90px"

                          <option>연락처</option>
                        </select>
                        <input
                          type="text"
                          class="form-control input-sm applicants-name-input"
                          placeholder="검색어"

                        <button

                          class="btn btn-default btn-sm"

                        <button
                          type="button"
                          class="btn btn-default btn-sm"

                    </span>

            </div>

              <ul class="list-inline">
                <li>

                <li class="pull-right PAD0">
                  <button
                    type="button"
                    class="btn btn-success btn-sm"
                    id="btn-primary-action"

                  </button>
                  <button

                    class="btn btn-default btn-sm"
                    id="btn-secondary-action"
                  >
                    인쇄
                  </button>
                </li>

                  style="margin-top: 0"

                  <thead id="sub-thead"></thead>
                  <tbody id="sub-tbody"></tbody>
                </table>
              </div>

              <div class="panel-body MAT30" style="text-align: center">
                <ul>
                  <li class="PAD0" style="float: left">
                    <select class="form-control" id="bulk-action">

                      <option value="del">선택삭제</option>
                      <option value="status">상태변경</option>
                    </select>
                    <button

                      class="btn btn-default"
                      id="bulk-apply"

                    </button>
                  </li>
                  <li style="text-align: right" class="MAlignCenter">
                    <ul class="pagination">
                      <li class="active"><a href="#none;">1</a></li>
                      <li><a href="#none;">2</a></li>
                      <li class="next"><a href="#none;">다음</a></li>
                    </ul>
                  </li>
                </ul>
              </div>

          </div>

          <div class="help_box" id="sub-help-box">

          </div>
        </div>

        <div id="footer" class="footer">
          <span class="muted">DBDB School Clone</span>
        </div>

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <script src="./assets/js/app.js"></script>

          pdf1: {
            title: "고지서출력",
            action1: "고지서인쇄",

            rows: [
              "<tr><td><input type='checkbox'></td><td>김예준</td><td>2학년 3반</td><td>월/수</td><td class='text-left'>[방과후] 영어 A반</td><td>14:00~14:50</td></tr>",

        document.getElementById("subpage-title").textContent = def.title;
        document.getElementById("btn-primary-action").textContent = def.action1;
        document.getElementById("btn-secondary-action").textContent =
          def.action2;
        document.getElementById("sub-thead").innerHTML = def.head;
        document.getElementById("sub-tbody").innerHTML = def.rows.join("");
        document.getElementById("sub-help-list").innerHTML = def.help
          .map(function (x) {
            return "<li>" + x + "</li>";
          })
          .join("");

        document
          .getElementById("btn-search")
          .addEventListener("click", function () {
            if (window.notify)
              window.notify("검색 조건으로 목록을 갱신했습니다.");
          });
        document
          .getElementById("btn-reset")
          .addEventListener("click", function () {
            var inputs = document.querySelectorAll(
              "#sub-search-form input[type='text']",
            );
            for (var i = 0; i < inputs.length; i += 1) inputs[i].value = "";
            if (window.notify) window.notify("검색 조건을 초기화했습니다.");
          });
        document
          .getElementById("btn-primary-action")
          .addEventListener("click", function () {
            if (window.notify)
              window.notify(def.action1 + " 처리를 완료했습니다.");
          });
        document
          .getElementById("btn-secondary-action")
          .addEventListener("click", function () {
            if (window.notify)
              window.notify(def.action2 + "을(를) 실행했습니다.");
          });
        document
          .getElementById("bulk-apply")
          .addEventListener("click", function () {
            var value = document.getElementById("bulk-action").value;
            if (!value) {
              if (window.notify)
                window.notify("일괄적용 항목을 선택해 주세요.");
              return;
            }
            if (window.notify) window.notify("선택 항목에 일괄 적용했습니다.");
          });

    </script>
  </body>
</html>
